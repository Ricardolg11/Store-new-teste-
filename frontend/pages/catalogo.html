<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo — Store da Nail</title>
  <link rel="stylesheet" href="stylecatalogo.css">
</head>
<body>

<div class="topbar">
  <strong>Store da Nail</strong>
  <input type="text" id="gSearch" placeholder="Pesquisar produto…" oninput="onSearch(this.value)"/>
  <span id="userName"></span>
  <button onclick="sair()">Sair</button>
</div>

<div class="layout">

  <div class="sidebar">
    <h3>Filtrar por marca</h3>
    <input type="text" id="brandInput" placeholder="Buscar marca…" oninput="filterChips(this.value)"/>
    <div class="chips" id="chips"></div>
  </div>


  <div class="main">
    <div class="main-header">
      <div>
        <h2>Catálogo de Produtos</h2>
        <span id="countLabel"></span>
      </div>
      <button class="add" onclick="abrirCriar()">+ Novo Produto</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('nome')">Nome ⇅</th>
            <th onclick="sortBy('marca')">Marca ⇅</th>
            <th>Categoria</th>
            <th onclick="sortBy('preco_custo')">Venda ⇅</th>
            <th onclick="sortBy('preco_venda')">Custo ⇅</th>
            <th onclick="sortBy('estoque')">Estoque ⇅</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="overlay" id="formOverlay">
  <div class="modal">
    <h3 id="formTitle">Novo Produto</h3>
    <input type="hidden" id="fId"/>
    <div class="form-grid">
      <div class="fg full">
        <label>Nome</label>
        <input type="text" id="fNome" placeholder="Ex: Matefix Lipstick"/>
      </div>
      <div class="fg">
        <label>Marca</label>
        <select id="fMarca">
          <option value="">Selecione…</option>
          <option>Obsidian</option>
          <option>Eudora</option>
          <option>Natura</option>
          <option>Impala</option>
        </select>
      </div>
      <div class="fg">
        <label>Categoria</label>
        <select id="fCategoria">
          <option value="">Selecione…</option>
          <option>Skincare</option>
          <option>Maquiagem</option>
          <option>Esmaltes</option>
          <option>Unhas</option>
          <option>Perfumaria</option>
        </select>
      </div>
      <div class="fg">
        <label>Preço de Custo (R$)</label>
        <input type="number" id="fCusto" min="0" step="0.01" placeholder="0,00"/>
      </div>
      <div class="fg">
        <label>Preço de Venda (R$)</label>
        <input type="number" id="fVenda" min="0" step="0.01" placeholder="0,00"/>
      </div>
      <div class="fg">
        <label>Estoque</label>
        <input type="number" id="fEstoque" min="0" placeholder="0"/>
      </div>
      <div class="fg full">
        <label>URL da Imagem (opcional)</label>
        <input type="text" id="fImagem" placeholder="https://…"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="fechar('formOverlay')">Cancelar</button>
      <button class="btn-save"   onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<div class="overlay" id="delOverlay">
  <div class="modal" style="max-width:360px">
    <h3>Excluir Produto</h3>
    <p class="del-msg">Tem certeza que deseja excluir <strong id="delNome"></strong>?</p>
    <div class="modal-footer">
      <button class="btn-cancel"      onclick="fechar('delOverlay')">Cancelar</button>
      <button class="btn-del-confirm" onclick="confirmarDel()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/api.js"></script>
<script src="scriptcatalogo.js"></script>
</body>
</html>
