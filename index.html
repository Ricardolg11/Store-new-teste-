<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store da Nail — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:      #c9796a;
      --rose-lt:   #e8b4ac;
      --cream:     #fdf6f0;
      --warm:      #f5ebe3;
      --brown:     #7a4f3a;
      --text:      #2e1c14;
      --muted:     #9c7b6e;
      --border:    #e2d2ca;
      --white:     #ffffff;
      --shadow:    0 8px 40px rgba(122,79,58,.12);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* background blobs */
    body::before {
      content: '';
      position: fixed;
      width: 520px; height: 520px;
      background: radial-gradient(circle, var(--rose-lt) 0%, transparent 70%);
      top: -140px; right: -140px;
      border-radius: 50%;
      opacity: .45;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, #d4a69a 0%, transparent 70%);
      bottom: -120px; left: -100px;
      border-radius: 50%;
      opacity: .3;
    }

    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 52px 48px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
      animation: fadeUp .6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--rose), var(--brown));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      color: white;
      font-weight: 600;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: .3px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--brown);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 8px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--warm);
      outline: none;
      transition: border-color .2s, background .2s;
    }

    input:focus {
      border-color: var(--rose);
      background: var(--white);
    }

    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 44px; }
    .toggle-pass {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--muted);
      font-size: 18px; line-height: 1;
    }

    .error-msg {
      display: none;
      background: #fdecea;
      border: 1px solid #f5c6c0;
      color: #c0392b;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .error-msg.show { display: block; }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--rose) 0%, var(--brown) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: .3px;
      transition: opacity .2s, transform .15s;
      margin-top: 8px;
    }

    .btn-primary:hover { opacity: .92; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-primary.loading {
      pointer-events: none;
      opacity: .7;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 28px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-icon">SN</div>
    <span class="brand-name">Store da Nail</span>
  </div>

  <h1>Bem-vinda,<br><em>Érica</em> 👋</h1>
  <p class="subtitle">Acesse o painel de gestão da sua loja</p>

  <div class="error-msg" id="errorMsg">E-mail ou senha incorretos. Tente novamente.</div>

  <div class="field">
    <label for="email">E-mail</label>
    <input type="email" id="email" placeholder="erica@storedanail.com" autocomplete="username" />
  </div>

  <div class="field">
    <label for="password">Senha</label>
    <div class="pass-wrap">
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      <button class="toggle-pass" id="togglePass" type="button" title="Mostrar senha">👁</button>
    </div>
  </div>

  <button class="btn-primary" id="btnLogin" onclick="handleLogin()">Entrar</button>

  <p class="footer-note">Store da Nail © 2025 — Sistema de Gestão</p>
</div>

<script src="js/api.js"></script>
<script>
  // toggle password visibility
  document.getElementById('togglePass').addEventListener('click', function() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  });

  // press Enter to login
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btnLogin');
    const errEl    = document.getElementById('errorMsg');

    errEl.classList.remove('show');

    if (!email || !password) {
      errEl.textContent = 'Preencha e-mail e senha.';
      errEl.classList.add('show');
      return;
    }

    btn.textContent = 'Entrando…';
    btn.classList.add('loading');

    try {
      const result = await API.login(email, password);
      // salva token e redireciona
      localStorage.setItem('token', result.token);
      localStorage.setItem('user', JSON.stringify(result.user));
      window.location.href = 'pages/catalogo.html';
    } catch (err) {
      errEl.textContent = err.message || 'Erro ao conectar com o servidor.';
      errEl.classList.add('show');
      btn.textContent = 'Entrar';
      btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
